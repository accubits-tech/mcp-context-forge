###############################################################################
#  MCP Foundry - Production Docker Compose
#
#  This file pulls PRE-BUILT images from ghcr.io/accubits-tech/.
#  No source code is needed on the server — just this file + .env.
#
#  Usage:
#    1. Copy this file and .env to the production server
#    2. docker compose -f docker-compose.prod.yml up -d
###############################################################################

networks:
  mcpnet:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  nginx_cache:
  firecrawl_pgdata:
  # Persists source archives + build logs across gateway restarts when the
  # Deploy MCP Server feature is enabled (see gateway.volumes below).
  deploy_artifacts:

services:

  # ──────────────────────────────────────────────────────────────────────
  # Nginx Caching Proxy
  # ──────────────────────────────────────────────────────────────────────
  nginx:
    image: ghcr.io/accubits-tech/mcp-foundry-nginx:latest
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    networks: [mcpnet]
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - nginx_cache:/var/cache/nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ──────────────────────────────────────────────────────────────────────
  # MCP Foundry Gateway (Backend API)
  # ──────────────────────────────────────────────────────────────────────
  gateway:
    image: ghcr.io/accubits-tech/mcp-foundry:latest
    restart: unless-stopped
    # No port exposure — accessed only via nginx on the internal network
    networks: [mcpnet]
    environment:
      # ── Core ──
      - HOST=0.0.0.0
      - PORT=4444
      - ENVIRONMENT=production
      - APP_DOMAIN=${APP_DOMAIN:-localhost}
      - APP_ROOT_PATH=${APP_ROOT_PATH:-}
      # ── Database & Cache ──
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-mysecretpassword}@postgres:5432/${POSTGRES_DB:-mcp}
      - CACHE_TYPE=redis
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      # ── JWT / Auth ──
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-mcpgateway-api}
      - JWT_ISSUER=${JWT_ISSUER:-mcpgateway}
      - REQUIRE_TOKEN_EXPIRATION=${REQUIRE_TOKEN_EXPIRATION:-true}
      - AUTH_REQUIRED=true
      - AUTH_ENCRYPTION_SECRET=${AUTH_ENCRYPTION_SECRET:-changeme}
      # ── Admin Account ──
      - EMAIL_AUTH_ENABLED=true
      - PLATFORM_ADMIN_EMAIL=${PLATFORM_ADMIN_EMAIL:-admin@example.com}
      - PLATFORM_ADMIN_PASSWORD=${PLATFORM_ADMIN_PASSWORD:-changeme}
      - MCP_CLIENT_AUTH_ENABLED=true
      - TRUST_PROXY_AUTH=false
      # ── CORS & Security ──
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - CORS_ALLOW_CREDENTIALS=true
      - SECURITY_HEADERS_ENABLED=true
      - SECURE_COOKIES=${SECURE_COOKIES:-true}
      - SSRF_PROTECTION_ENABLED=${SSRF_PROTECTION_ENABLED:-true}
      # ── Features ──
      # UI_ENABLED gates static-asset mounting and the / -> /admin redirect.
      # ADMIN_API_ENABLED gates the entire /admin/* router (JSON + HTML).
      # ADMIN_HTML_UI_ENABLED gates only the legacy HTMX/Alpine.js HTML pages
      # (login, dashboard, partial fragments). Keep the JSON /admin/* endpoints
      # enabled for the React frontend.
      - MCPGATEWAY_UI_ENABLED=${MCPGATEWAY_UI_ENABLED:-false}
      - MCPGATEWAY_ADMIN_API_ENABLED=${MCPGATEWAY_ADMIN_API_ENABLED:-true}
      - MCPGATEWAY_ADMIN_HTML_UI_ENABLED=${MCPGATEWAY_ADMIN_HTML_UI_ENABLED:-false}
      - PLUGINS_ENABLED=${PLUGINS_ENABLED:-true}
      - PLUGIN_MAX_PAYLOAD_SIZE=${PLUGIN_MAX_PAYLOAD_SIZE:-5000000}
      - MCPGATEWAY_CATALOG_ENABLED=${MCPGATEWAY_CATALOG_ENABLED:-true}
      - MCPGATEWAY_A2A_ENABLED=${MCPGATEWAY_A2A_ENABLED:-true}
      # ── SSO (optional — uncomment provider vars in .env) ──
      - SSO_ENABLED=${SSO_ENABLED:-false}
      - SSO_KEYCLOAK_ENABLED=${SSO_KEYCLOAK_ENABLED:-false}
      - SSO_KEYCLOAK_BASE_URL=${SSO_KEYCLOAK_BASE_URL:-}
      - SSO_KEYCLOAK_REALM=${SSO_KEYCLOAK_REALM:-}
      - SSO_KEYCLOAK_CLIENT_ID=${SSO_KEYCLOAK_CLIENT_ID:-}
      - SSO_KEYCLOAK_CLIENT_SECRET=${SSO_KEYCLOAK_CLIENT_SECRET:-}
      # ── LLM (AI-enhanced tool import) ──
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-https://api.openai.com/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      # ── LLM Chat / Playground ──
      - LLMCHAT_ENABLED=${LLMCHAT_ENABLED:-true}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0.7}
      - OPENAI_MAX_RETRIES=${OPENAI_MAX_RETRIES:-2}
      # ── Database Pool (Docker networking tuning) ──
      - DB_POOL_SIZE=${DB_POOL_SIZE:-25}
      - DB_POOL_RECYCLE=${DB_POOL_RECYCLE:-300}
      # ── Logging ──
      - LOG_LEVEL=${LOG_LEVEL:-ERROR}
      - DISABLE_ACCESS_LOG=true
      - LOG_FORMAT=${LOG_FORMAT:-json}
      # ── Firecrawl (uncomment to enable) ──
      - FIRECRAWL_ENABLED=${FIRECRAWL_ENABLED:-false}
      - FIRECRAWL_API_URL=${FIRECRAWL_API_URL:-http://firecrawl-api:3002}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - DOC_CRAWLER_MAX_PAGES=${DOC_CRAWLER_MAX_PAGES:-50}
      - DOC_CRAWLER_MAX_DEPTH=${DOC_CRAWLER_MAX_DEPTH:-5}
      # ── Runtime paths ──
      - HOME=/app
      - XDG_DATA_HOME=/app/.local/share
      - XDG_CACHE_HOME=/app/.cache
      - XDG_CONFIG_HOME=/app/.config
      # ── Deploy MCP Server (gateway-hosted Python/Node builds) ──
      # WARNING: this feature requires the /var/run/docker.sock mount below,
      # which effectively grants the gateway container root-on-host via the
      # Docker daemon. Any RCE against the gateway can escape the container.
      # Fine for single-tenant operator-controlled deployments. Set this to
      # 'false' AND remove the docker.sock mount for multi-tenant or public
      # deployments until a rootless/Sysbox/DinD isolation layer is in place.
      - MCPGATEWAY_DEPLOY_ENABLED=${MCPGATEWAY_DEPLOY_ENABLED:-true}
      - MCPGATEWAY_DEPLOY_DRIVER=${MCPGATEWAY_DEPLOY_DRIVER:-docker}
      - MCPGATEWAY_DEPLOY_BASE_IMAGE_PYTHON=${MCPGATEWAY_DEPLOY_BASE_IMAGE_PYTHON:-python:3.12-slim}
      - MCPGATEWAY_DEPLOY_BASE_IMAGE_NODE=${MCPGATEWAY_DEPLOY_BASE_IMAGE_NODE:-node:20-slim}
      - MCPGATEWAY_DEPLOY_MAX_ARCHIVE_MB=${MCPGATEWAY_DEPLOY_MAX_ARCHIVE_MB:-50}
      - MCPGATEWAY_DEPLOY_MAX_BUILD_SECONDS=${MCPGATEWAY_DEPLOY_MAX_BUILD_SECONDS:-600}
      - MCPGATEWAY_DEPLOY_MAX_CONCURRENT_BUILDS=${MCPGATEWAY_DEPLOY_MAX_CONCURRENT_BUILDS:-3}
      - MCPGATEWAY_DEPLOY_PORT_RANGE_START=${MCPGATEWAY_DEPLOY_PORT_RANGE_START:-9201}
      - MCPGATEWAY_DEPLOY_PORT_RANGE_END=${MCPGATEWAY_DEPLOY_PORT_RANGE_END:-9400}
      - MCPGATEWAY_DEPLOY_CPU_LIMIT=${MCPGATEWAY_DEPLOY_CPU_LIMIT:-1.0}
      - MCPGATEWAY_DEPLOY_MEMORY_MB=${MCPGATEWAY_DEPLOY_MEMORY_MB:-512}
      - MCPGATEWAY_DEPLOY_PIDS_LIMIT=${MCPGATEWAY_DEPLOY_PIDS_LIMIT:-128}
      - MCPGATEWAY_DEPLOY_DISK_MB=${MCPGATEWAY_DEPLOY_DISK_MB:-512}
      - MCPGATEWAY_DEPLOY_EGRESS_DEFAULT=${MCPGATEWAY_DEPLOY_EGRESS_DEFAULT:-deny}
      - MCPGATEWAY_DEPLOY_MAX_PER_TEAM=${MCPGATEWAY_DEPLOY_MAX_PER_TEAM:-10}
      - MCPGATEWAY_DEPLOY_ARTIFACT_DIR=${MCPGATEWAY_DEPLOY_ARTIFACT_DIR:-/app/var/deployments}
      - MCPGATEWAY_DEPLOY_LOG_RETENTION_DAYS=${MCPGATEWAY_DEPLOY_LOG_RETENTION_DAYS:-14}
      - MCPGATEWAY_DEPLOY_HEALTH_CHECK_INTERVAL=${MCPGATEWAY_DEPLOY_HEALTH_CHECK_INTERVAL:-30}
      - MCPGATEWAY_DEPLOY_RESTART_MAX_RETRIES=${MCPGATEWAY_DEPLOY_RESTART_MAX_RETRIES:-3}
    # Mounts required for the Deploy MCP Server feature. Mounting
    # docker.sock grants host-root-equivalent access via the Docker daemon
    # to anyone who can reach this container — see the security warning on
    # MCPGATEWAY_DEPLOY_ENABLED above. Remove both lines below AND set
    # MCPGATEWAY_DEPLOY_ENABLED=false to disable the feature cleanly.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - deploy_artifacts:/app/var/deployments
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      # azure-mcp dependency removed — gateway starts independently;
      # register the Azure MCP server later via the admin UI if needed
      # azure-mcp:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; import json; resp = urllib.request.urlopen('http://localhost:4444/health', timeout=5); data = json.loads(resp.read()); exit(0 if data.get('status') == 'healthy' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────────────────────────────
  # MCP Foundry Frontend
  # ──────────────────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/accubits-tech/mcp-foundry-fe:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks: [mcpnet]
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ──────────────────────────────────────────────────────────────────────
  # Azure MCP Server
  # ──────────────────────────────────────────────────────────────────────
  azure-mcp:
    image: mcr.microsoft.com/azure-sdk/azure-mcp:latest
    restart: unless-stopped
    command: ["--transport", "http", "--dangerously-disable-http-incoming-auth"]
    ports:
      - "${AZURE_MCP_PORT:-8081}:5000"
    networks: [mcpnet]
    environment:
      - DOTNET_URLS=http://0.0.0.0:5000
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ──────────────────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mysecretpassword}
      - POSTGRES_DB=${POSTGRES_DB:-mcp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [mcpnet]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────────────────────────────
  # Redis Cache
  # ──────────────────────────────────────────────────────────────────────
  redis:
    image: redis:latest
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redisdata:/data
    networks: [mcpnet]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

###############################################################################
#  FIRECRAWL OSS - Web crawler for API documentation
#  Provides Markdown extraction, JS rendering, and sitemap-based discovery.
#  To enable: set FIRECRAWL_ENABLED=true in .env
###############################################################################

  firecrawl-api:
    image: ghcr.io/firecrawl/firecrawl:latest
    restart: unless-stopped
    networks: [mcpnet]
    environment:
      - HOST=0.0.0.0
      - PORT=3002
      - USE_DB_AUTHENTICATION=false
      - REDIS_URL=redis://firecrawl-redis:6379
      - REDIS_RATE_LIMIT_URL=redis://firecrawl-redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://firecrawl-playwright:3000/scrape
      - NUM_WORKERS_PER_QUEUE=${FIRECRAWL_WORKERS:-2}
      - NUQ_RABBITMQ_URL=amqp://firecrawl-rabbitmq:5672
      - NUQ_DATABASE_URL=postgresql://postgres:${FIRECRAWL_DB_PASSWORD:-postgres}@firecrawl-postgres:5432/postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${FIRECRAWL_DB_PASSWORD:-postgres}
      - POSTGRES_DB=postgres
      - POSTGRES_HOST=firecrawl-postgres
      - POSTGRES_PORT=5432
    depends_on:
      firecrawl-redis:
        condition: service_started
      firecrawl-playwright:
        condition: service_started
      firecrawl-rabbitmq:
        condition: service_healthy
      firecrawl-postgres:
        condition: service_healthy
    command: node dist/src/harness.js --start-docker
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  firecrawl-redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --bind 0.0.0.0
    networks: [mcpnet]

  firecrawl-rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    command: rabbitmq-server
    networks: [mcpnet]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  firecrawl-postgres:
    build: ./firecrawl-nuq-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${FIRECRAWL_DB_PASSWORD:-postgres}
      - POSTGRES_DB=postgres
    volumes:
      - firecrawl_pgdata:/var/lib/postgresql/data
    networks: [mcpnet]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  firecrawl-playwright:
    image: ghcr.io/firecrawl/playwright-service:latest
    restart: unless-stopped
    environment:
      - PORT=3000
    networks: [mcpnet]
