  - id: azure-mcp
    name: "Azure MCP Server"
    category: "Cloud Infrastructure"
    url: "http://azure-mcp:5000"
    transport: "STREAMABLEHTTP"
    auth_type: "Open"
    provider: "Microsoft"
    description: "Microsoft's official MCP server for Azure, enabling AI agents to manage 40+ Azure services including resource groups, VMs, storage, Cosmos DB, Key Vault, AKS, App Service, Container Apps, and more through natural language."
    requires_api_key: false
    tags: ["cloud", "azure", "infrastructure", "devops"]
    logo_url: "https://img.logo.dev/azure.microsoft.com?token=pk_IQgnPY69T4mLXixm3ohN9A"
    documentation_url: "https://learn.microsoft.com/en-us/azure/developer/azure-mcp-server/get-started"
    tools: ["list_resource_groups", "create_resource_group", "list_resources", "get_resource", "list_subscriptions", "get_subscription", "list_storage_accounts", "create_storage_account", "list_containers", "upload_blob", "download_blob", "list_key_vaults", "get_secret", "set_secret", "list_cosmos_accounts", "query_cosmos", "list_app_services", "create_web_app", "list_container_apps", "deploy_container_app", "list_aks_clusters", "get_aks_cluster", "list_sql_databases", "query_sql", "list_redis_caches", "get_advisor_recommendations", "list_policy_assignments"]
    env_config:
      required_vars:
        - AZURE_TENANT_ID
        - AZURE_CLIENT_ID
        - AZURE_CLIENT_SECRET
      setup_guide: |
        Authentication uses Azure Entra ID (Service Principal) via container environment variables.
        No HTTP headers needed — the Azure MCP server authenticates outbound to Azure APIs
        internally using EnvironmentCredential (AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET).
        1. Create a service principal: az ad sp create-for-rbac --name "mcp-server" --role contributor --scopes /subscriptions/<sub-id>
        2. Set AZURE_TENANT_ID, AZURE_CLIENT_ID, and AZURE_CLIENT_SECRET in your .env file
        3. Docker compose passes these as container environment variables automatically

