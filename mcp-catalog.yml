# MCP Server Catalog Configuration
# This file contains a curated list of public MCP servers that can be easily added to the gateway

catalog_servers:
  # Project Management
  - id: asana
    name: "Asana"
    category: "Project Management"
    url: "https://mcp.asana.com/v2/mcp"
    auth_type: "OAuth2.1"
    provider: "Asana"
    description: "Asana's MCP server enables AI assistants to access the Asana Work Graph, allowing agents to create and manage tasks through natural language, generate reports, and analyze project data with AI-powered insights."
    requires_api_key: false
    tags: ["project-management", "collaboration", "tasks"]
    logo_url: "https://img.logo.dev/asana.com?token=pk_IQgnPY69T4mLXixm3ohN9A"
    documentation_url: "https://developers.asana.com/docs/using-asanas-mcp-server"
    tools: ["search_objects", "search_tasks", "get_task", "get_tasks", "create_task", "update_task", "create_project", "get_project", "get_projects", "get_portfolio", "get_portfolios", "get_items_for_portfolio", "get_status_overview", "get_user", "get_workspace_users"]
    oauth_config:
      authorize_url: "https://app.asana.com/-/oauth_authorize"
      token_url: "https://app.asana.com/-/oauth_token"
      scopes: []
      supports_dcr: false
      setup_guide: |
        1. Go to Asana Developer Console (https://app.asana.com/0/my-apps)
        2. Click 'Create new app'
        3. Fill in App name and redirect URL
        4. Copy the Client ID and Client Secret from the app settings
        5. MCP apps don't require specific scopes - access matches the authenticated user's permissions

  - id: linear
    name: "Linear"
    category: "Project Management"
    url: "https://mcp.linear.app/mcp"
    auth_type: "OAuth2.1"
    provider: "Linear"
    description: "Linear's MCP server provides AI agents with standardized access to Linear project management data, enabling them to read and write issues, projects, comments, and workflow states without manual context-switching."
    requires_api_key: false
    tags: ["project-management", "issue-tracking", "development"]
    logo_url: "https://img.logo.dev/linear.app?token=pk_IQgnPY69T4mLXixm3ohN9A"
    documentation_url: "https://linear.app/docs/mcp"
    tools: ["save_issue", "get_issue", "list_issues", "create_comment", "list_comments", "save_project", "get_project", "list_projects", "create_document", "update_document", "get_document", "list_documents", "get_team", "list_teams", "list_users", "get_user", "list_issue_statuses", "get_issue_status", "list_issue_labels", "create_issue_label", "list_cycles", "list_initiatives", "get_initiative", "save_initiative", "list_milestones", "get_milestone", "save_milestone", "get_status_updates", "save_status_update", "delete_status_update", "get_attachment", "create_attachment", "delete_attachment", "extract_images", "search_documentation"]
    oauth_config:
      authorize_url: "https://linear.app/oauth/authorize"
      token_url: "https://api.linear.app/oauth/token"
      scopes: ["read", "write", "issues:create", "comments:create"]
      supports_dcr: true
      setup_guide: |
        No external OAuth app setup required. This server supports Dynamic Client
        Registration (RFC 7591). MCP clients register automatically. Users are
        redirected to Linear to authorize via their Linear account.
        Alternative: Use a Personal API Key as a Bearer token.

