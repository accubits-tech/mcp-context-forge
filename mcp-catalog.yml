  # Software Development
  - id: github
    name: "GitHub"
    category: "Software Development"
    url: "https://api.githubcopilot.com/mcp/"
    auth_type: "OAuth2.1"
    provider: "GitHub"
    secure: true
    description: "GitHub's MCP server provides AI agents with access to repositories, issues, pull requests, actions, code security, and discussions, enabling automated code review, issue management, and CI/CD workflows."
    requires_api_key: false
    tags: ["development", "git", "version-control", "collaboration"]
    logo_url: "https://img.logo.dev/github.com?token=pk_IQgnPY69T4mLXixm3ohN9A"
    documentation_url: "https://docs.github.com/en/copilot/how-tos/provide-context/use-mcp/use-the-github-mcp-server"
    tools: ["get_me", "search_repositories", "get_file_contents", "list_commits", "search_code", "list_branches", "create_branch", "push_files", "create_or_update_file", "create_repository", "fork_repository", "issue_read", "search_issues", "list_issues", "issue_write", "add_issue_comment", "pull_request_read", "list_pull_requests", "search_pull_requests", "create_pull_request", "update_pull_request", "merge_pull_request", "pull_request_review_write", "search_users", "search_orgs"]
    oauth_config:
      authorize_url: "https://github.com/login/oauth/authorize"
      token_url: "https://github.com/login/oauth/access_token"
      scopes: ["repo", "read:user", "user:email", "workflow", "read:org", "gist", "notifications", "project", "read:packages", "write:packages", "read:project", "codespace"]
      supports_dcr: false
      setup_guide: |
        1. Go to GitHub Settings > Developer settings > OAuth Apps > New OAuth App
           (https://github.com/settings/developers)
        2. Fill in Application name, Homepage URL, and Authorization callback URL
        3. Click 'Register application'
        4. Copy the Client ID from the app page
        5. Click 'Generate a new client secret' and copy it immediately
        Note: GitHub Apps (recommended over OAuth Apps) can also be used.
        Alternative: Use a Personal Access Token (PAT) as a Bearer token.

